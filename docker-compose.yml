services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: service-order-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - infrastructure_default

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: service-order-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infrastructure_default

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: service-order-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      set -euo pipefail

      create_topic_with_retry() {
        local topic="$$1"

        for i in {1..10}; do
          if kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1; then
            return 0
          fi

          echo "Retrying topic creation for '$$topic' ($$i/10)..."
          sleep 2
        done

        echo "Failed to create topic '$$topic' after retries"
        return 1
      }

      create_topic_with_retry numbers
      create_topic_with_retry numbers-dlq

      for i in {1..10}; do
        if printf '10\n-4\n3\n-8\nabc\n15\n' | kafka-console-producer --bootstrap-server kafka:29092 --topic numbers; then
          exit 0
        fi

        echo "Retrying seed message publish ($$i/10)..."
        sleep 2
      done

      echo "Failed to publish seed messages after retries"
      exit 1
    networks:
      - infrastructure_default

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: service-order-clickhouse
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - infrastructure_default

  postgres:
    image: postgres:15
    container_name: service-order-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "db"
      POSTGRES_PORT: "5432"
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "port=5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrastructure_default


  service-order:
    build:
      context: .
      target: service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/db?sslmode=disable
    ports:
      - "50051:50051"
      - "8080:8080"
    networks:
      - infrastructure_default


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - infrastructure_default

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - infrastructure_default

networks:
  infrastructure_default:
    name: infrastructure_default

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
  clickhouse-data:
